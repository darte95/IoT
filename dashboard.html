<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBTC-MNG IoT Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-glow: #10b981;
            --danger-glow: #ef4444;
            --border-color: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Prompt', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 2rem;
            min-height: 100vh;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        h1 i {
            color: #38bdf8;
        }

        .refresh-status {
            font-size: 0.9rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background-color: var(--accent-glow);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-glow);
            animation: pulse 1.5s infinite;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.5rem;
        }

        .icon-wrapper {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            background: rgba(56, 189, 248, 0.1);
            color: #38bdf8;
        }

        .device-info h2 {
            font-size: 1.2rem;
            margin-bottom: 0.2rem;
        }

        .device-info p {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .pin-badge {
            background: #334155;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #e2e8f0;
            letter-spacing: 0.5px;
        }

        .status-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: auto;
            padding-top: 1rem;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .status-text {
            font-size: 1.2rem;
            font-weight: 600;
        }

        /* Status Colors & Glows */
        .status-ON, .status-ACTIVE {
            color: var(--accent-glow);
            text-shadow: 0 0 10px rgba(16, 185, 129, 0.5);
        }

        .status-OFF {
            color: var(--danger-glow);
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .last-update {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-align: right;
            margin-top: 10px;
        }

    </style>
</head>
<body>

    <header>
        <h1><i class="fa-solid fa-microchip"></i> Smart Node Monitor</h1>
        <div class="refresh-status">
            <span id="update-time">Updating...</span>
            <div class="status-dot" id="connection-dot"></div>
        </div>
    </header>

    <div class="dashboard-grid" id="dashboard-grid">
        </div>

    <script>
        const API_URL = 'http://tc.sbtc-mng.com/api.php';
        const REFRESH_RATE = 5000; // อัปเดตทุก 5 วินาที

        // ข้อมูลสำรองเผื่อเรียก API ไม่ได้ (CORS หรือ Server Down)
        const mockData = {
            "success": true,
            "count": 5,
            "data": [
                { "id": "1", "device_name": "LED1", "device_type": "LED", "pin": "13", "status": "ON", "created_at": "2026-06-30 10:16:41" },
                { "id": "2", "device_name": "LED2", "device_type": "LED", "pin": "12", "status": "OFF", "created_at": "2026-06-30 10:16:41" },
                { "id": "3", "device_name": "Temperature", "device_type": "SENSOR", "pin": "34", "status": "ACTIVE", "created_at": "2026-06-30 10:16:41" },
                { "id": "4", "device_name": "Humidity", "device_type": "SENSOR", "pin": "35", "status": "ACTIVE", "created_at": "2026-06-30 10:16:41" },
                { "id": "5", "device_name": "Soil Moisture", "device_type": "SENSOR", "pin": "36", "status": "ACTIVE", "created_at": "2026-06-30 10:16:41" }
            ]
        };

        // ฟังก์ชันเลือกไอคอนตามประเภทและชื่ออุปกรณ์
        function getIconClass(type, name) {
            const nameLower = name.toLowerCase();
            if (type === 'LED') return 'fa-lightbulb';
            if (nameLower.includes('temp')) return 'fa-temperature-half';
            if (nameLower.includes('humid')) return 'fa-droplet';
            if (nameLower.includes('soil')) return 'fa-leaf';
            return 'fa-tower-broadcast';
        }

        // ฟังก์ชันสร้าง Card HTML
        function createCard(device) {
            const iconClass = getIconClass(device.device_type, device.device_name);
            const statusClass = `status-${device.status}`;
            const timeOnly = device.created_at.split(' ')[1] || device.created_at;

            return `
                <div class="card" id="device-${device.id}">
                    <div class="card-header">
                        <div class="icon-wrapper">
                            <i class="fa-solid ${iconClass}"></i>
                        </div>
                        <span class="pin-badge">PIN ${device.pin}</span>
                    </div>
                    <div class="device-info">
                        <h2>${device.device_name}</h2>
                        <p>${device.device_type}</p>
                    </div>
                    <div class="status-container">
                        <span style="color: var(--text-muted); font-size: 0.9rem;">Status</span>
                        <span class="status-text ${statusClass}">${device.status}</span>
                    </div>
                    <div class="last-update">Sync: ${timeOnly}</div>
                </div>
            `;
        }

        // ฟังก์ชันอัปเดตหน้าจอ
        function renderDashboard(devices) {
            const grid = document.getElementById('dashboard-grid');
            grid.innerHTML = devices.map(dev => createCard(dev)).join('');
            
            const now = new Date();
            document.getElementById('update-time').innerText = `Last update: ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;
        }

        // ฟังก์ชันดึงข้อมูลจาก API
        async function fetchDeviceData() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Network response was not ok');
                const result = await response.json();
                
                if (result.success && result.data) {
                    renderDashboard(result.data);
                    document.getElementById('connection-dot').style.backgroundColor = 'var(--accent-glow)';
                }
            } catch (error) {
                console.warn('API Fetch Failed, using Mock Data instead:', error);
                // เปลี่ยนสีจุดสถานะเป็นสีส้ม/แดง เพื่อบอกว่ากำลังใช้ Mock Data/Offline
                document.getElementById('connection-dot').style.backgroundColor = '#f59e0b';
                renderDashboard(mockData.data);
            }
        }

        // โหลดข้อมูลครั้งแรก
        fetchDeviceData();

        // ตั้งเวลาอัปเดตข้อมูลอัตโนมัติ
        setInterval(fetchDeviceData, REFRESH_RATE);

    </script>
</body>
</html>
