<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Farm IoT Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

background:
radial-gradient(circle at top,#003b63,#07131f 55%,#02070d);

min-height:100vh;
overflow-x:hidden;
color:white;
}

body:before{

content:'';
position:fixed;
width:800px;
height:800px;
left:-250px;
top:-250px;

background:#00f7ff33;

filter:blur(120px);

animation:move1 18s infinite alternate;

}

body:after{

content:'';
position:fixed;
width:700px;
height:700px;
right:-250px;
bottom:-250px;

background:#00ff8830;

filter:blur(120px);

animation:move2 15s infinite alternate;

}

@keyframes move1{
to{
transform:translate(150px,120px);
}
}

@keyframes move2{
to{
transform:translate(-120px,-100px);
}
}

.container{

width:95%;
max-width:1400px;

margin:auto;

padding:30px;

position:relative;
z-index:2;

}

.header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:30px;

flex-wrap:wrap;

}

.title{

font-size:38px;
font-weight:700;

letter-spacing:2px;

color:#00f7ff;

text-shadow:0 0 20px cyan;

}

.time{

font-size:15px;

opacity:.8;

}

.summary{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:20px;

margin-bottom:30px;

}

.box{

background:rgba(255,255,255,.08);

backdrop-filter:blur(15px);

border:1px solid rgba(255,255,255,.15);

border-radius:20px;

padding:25px;

box-shadow:0 0 25px rgba(0,255,255,.15);

transition:.4s;

}

.box:hover{

transform:translateY(-8px);

box-shadow:0 0 35px cyan;

}

.box h2{

font-size:18px;

margin-bottom:15px;

color:#00ffff;

}

.box h1{

font-size:42px;

}

.grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(260px,1fr));

gap:25px;

}

.card{

background:rgba(255,255,255,.07);

border-radius:25px;

padding:25px;

border:1px solid rgba(255,255,255,.15);

backdrop-filter:blur(20px);

transition:.4s;

position:relative;

overflow:hidden;

}

.card:hover{

transform:translateY(-8px);

box-shadow:0 0 30px cyan;

}

.card:before{

content:'';

position:absolute;

top:-100px;
right:-100px;

width:220px;
height:220px;

background:rgba(0,255,255,.08);

border-radius:50%;

}

.icon{

font-size:55px;

margin-bottom:10px;

}

.name{

font-size:24px;

font-weight:600;

margin-bottom:10px;

}

.type{

opacity:.7;

margin-bottom:15px;

}

.pin{

font-size:18px;

margin-bottom:20px;

}

.status{

display:inline-block;

padding:8px 18px;

border-radius:30px;

font-weight:bold;

}

.on{

background:#00ff88;

color:black;

box-shadow:0 0 20px #00ff88;

}

.off{

background:#ff4b5c;

box-shadow:0 0 20px red;

}

.active{

background:#00d4ff;

color:black;

box-shadow:0 0 20px cyan;

}

.footer{

text-align:center;

margin-top:35px;

opacity:.7;

}

.spin{

animation:spin 3s linear infinite;

display:inline-block;

}

@keyframes spin{

100%{
transform:rotate(360deg);
}

}

@media(max-width:700px){

.title{

font-size:28px;

}

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="title">
🌱 Smart Farm IoT Dashboard
</div>

<div class="time" id="time">
Loading...
</div>

</div>

<div class="summary">

<div class="box">

<h2>Total Devices</h2>

<h1 id="total">0</h1>

</div>

<div class="box">

<h2>LED</h2>

<h1 id="led">0</h1>

</div>

<div class="box">

<h2>Sensors</h2>

<h1 id="sensor">0</h1>

</div>

</div>

<div class="grid" id="devices">

</div>

<div class="footer">

Auto Refresh every 5 seconds

</div>

</div>

<script>

const API="http://tc.sbtc-mng.com/api.php";

async function loadData(){

try{

const res=await fetch(API);

const json=await res.json();

document.getElementById("total").innerHTML=json.count;

let led=0;
let sensor=0;

let html="";

json.data.forEach(d=>{

if(d.device_type=="LED") led++;
if(d.device_type=="SENSOR") sensor++;

let cls="active";

if(d.status=="ON") cls="on";

if(d.status=="OFF") cls="off";

let icon="💡";

if(d.device_type=="SENSOR")
icon="📡";

html+=`

<div class="card">

<div class="icon">${icon}</div>

<div class="name">${d.device_name}</div>

<div class="type">${d.device_type}</div>

<div class="pin">
GPIO ${d.pin}
</div>

<div class="status ${cls}">
${d.status}
</div>

<br><br>

<div style="opacity:.6;font-size:13px">

ID : ${d.id}

<br>

${d.created_at}

</div>

</div>

`;

});

document.getElementById("devices").innerHTML=html;

document.getElementById("led").innerHTML=led;

document.getElementById("sensor").innerHTML=sensor;

document.getElementById("time").innerHTML=
"Last Update : "+
new Date().toLocaleTimeString();

}
catch(e){

document.getElementById("devices").innerHTML=
"<h2>Cannot connect API</h2>";

}

}

loadData();

setInterval(loadData,5000);

</script>

</body>
</html>
